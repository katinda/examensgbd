<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padel Manager</title>
</head>
<body>

    <header>
        <h1>Padel Manager</h1>
        <nav>
            <button class="nav-btn active" data-section="sites">Sites</button>
            <button class="nav-btn" data-section="terrains">Terrains</button>
            <button class="nav-btn" data-section="membres">Membres</button>
            <button class="nav-btn" data-section="reservations">Réservations</button>
            <button class="nav-btn" data-section="penalites">Pénalités</button>
        </nav>
    </header>

    <main>

        <!-- SECTION SITES -->
        <section id="section-sites" class="section active">
            <div class="section-header">
                <h2>Sites</h2>
                <button id="btn-nouveau-site">+ Nouveau site</button>
            </div>

            <!-- Formulaire création -->
            <form id="form-site" style="display:none">
                <h3>Nouveau site</h3>
                <label>Nom <input type="text" name="nom" required></label>
                <label>Adresse <input type="text" name="adresse"></label>
                <label>Ville <input type="text" name="ville"></label>
                <label>Code postal <input type="text" name="code_postal"></label>
                <div class="form-actions">
                    <button type="submit">Créer</button>
                    <button type="button" id="btn-annuler-site">Annuler</button>
                </div>
            </form>

            <!-- Message d'erreur -->
            <p id="erreur-sites" style="display:none;color:red"></p>

            <!-- Liste des sites -->
            <table id="table-sites">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nom</th>
                        <th>Ville</th>
                        <th>Code postal</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tbody-sites">
                    <tr><td colspan="5">Chargement…</td></tr>
                </tbody>
            </table>
        </section>

        <!-- SECTION TERRAINS -->
        <section id="section-terrains" class="section">
            <div class="section-header">
                <h2>Terrains</h2>
                <button id="btn-nouveau-terrain">+ Nouveau terrain</button>
            </div>

            <!-- Formulaire création -->
            <form id="form-terrain" style="display:none">
                <h3>Nouveau terrain</h3>
                <label>Site
                    <select name="site_id" required>
                        <option value="">-- Choisir un site --</option>
                    </select>
                </label>
                <label>Numéro de terrain <input type="number" name="num_terrain" min="1" required></label>
                <label>Libellé <input type="text" name="libelle"></label>
                <div class="form-actions">
                    <button type="submit">Créer</button>
                    <button type="button" id="btn-annuler-terrain">Annuler</button>
                </div>
            </form>

            <!-- Message d'erreur -->
            <p id="erreur-terrains" style="display:none;color:red"></p>

            <!-- Liste des terrains -->
            <table id="table-terrains">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Site</th>
                        <th>N° terrain</th>
                        <th>Libellé</th>
                        <th>Actif</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tbody-terrains">
                    <tr><td colspan="6">Chargement…</td></tr>
                </tbody>
            </table>
        </section>

        <!-- SECTION MEMBRES -->
        <section id="section-membres" class="section">
            <div class="section-header">
                <h2>Membres</h2>
                <button id="btn-nouveau-membre">+ Nouveau membre</button>
            </div>

            <!-- Filtre par catégorie -->
            <div>
                <label>Filtrer par catégorie :
                    <select id="filtre-categorie">
                        <option value="">Tous</option>
                        <option value="G">Global (G)</option>
                        <option value="S">Site (S)</option>
                        <option value="L">Libre (L)</option>
                    </select>
                </label>
            </div>

            <!-- Formulaire création -->
            <form id="form-membre" style="display:none">
                <h3>Nouveau membre</h3>
                <label>Matricule <input type="text" name="matricule" required placeholder="G0001 / S00001 / L00001"></label>
                <label>Nom <input type="text" name="nom" required></label>
                <label>Prénom <input type="text" name="prenom" required></label>
                <label>Email <input type="email" name="email"></label>
                <label>Téléphone <input type="text" name="telephone"></label>
                <label>Catégorie
                    <select name="categorie" required>
                        <option value="">-- Choisir --</option>
                        <option value="G">Global (G)</option>
                        <option value="S">Site (S)</option>
                        <option value="L">Libre (L)</option>
                    </select>
                </label>
                <label id="label-site-membre" style="display:none">Site
                    <select name="site_id">
                        <option value="">-- Choisir un site --</option>
                    </select>
                </label>
                <div class="form-actions">
                    <button type="submit">Créer</button>
                    <button type="button" id="btn-annuler-membre">Annuler</button>
                </div>
            </form>

            <!-- Message d'erreur -->
            <p id="erreur-membres" style="display:none;color:red"></p>

            <!-- Liste des membres -->
            <table id="table-membres">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Matricule</th>
                        <th>Nom</th>
                        <th>Prénom</th>
                        <th>Catégorie</th>
                        <th>Email</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tbody-membres">
                    <tr><td colspan="7">Chargement…</td></tr>
                </tbody>
            </table>
        </section>

    </main>

    <script src="app.js"></script>
</body>
</html>
